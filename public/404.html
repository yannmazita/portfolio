<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      // Store the path that was requested
      // GitHub Pages will serve this 404.html for any direct navigation
      // We save the full URL and redirect to root, where our app will handle it
      sessionStorage.setItem('ghpages_redirect', location.href);
    </script>
    <meta http-equiv="refresh" content="0;URL='/'"></meta>
  </head>
  <body>
    <p>Redirecting...</p>
  </body>
</html>
